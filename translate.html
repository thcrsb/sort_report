<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時英文聽力翻譯字幕</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #subtitle-container {
            width: 90%;
            max-width: 1000px;
            text-align: center;
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .english {
            font-size: 1.8em;
            color: #b3b3b3;
            margin-bottom: 15px;
            min-height: 2em;
        }

        .chinese {
            font-size: 3em;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 4px #000;
            min-height: 1.5em;
        }

        button {
            padding: 15px 30px;
            font-size: 1.5em;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            background-color: #45a049;
        }

        button.recording {
            background-color: #f44336;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .status {
            margin-top: 15px;
            color: #888;
            font-size: 1em;
        }
    </style>
</head>
<body>

    <button id="start-btn">開始接收語音</button>
    <div class="status" id="status-text">點擊上方按鈕並允許麥克風權限</div>

    <div id="subtitle-container">
        <div class="english" id="en-text">Waiting for speech...</div>
        <div class="chinese" id="zh-text">等待語音輸入...</div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');
        const enText = document.getElementById('en-text');
        const zhText = document.getElementById('zh-text');

        let recognizing = false;
        let recognition;

        // 檢查瀏覽器是否支援 Web Speech API
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;      // 持續辨識
            recognition.interimResults = true;  // 顯示即時（尚未確認）的結果
            recognition.lang = 'en-US';         // 設定辨識語言為英文

            recognition.onstart = function() {
                recognizing = true;
                startBtn.textContent = '停止接收語音';
                startBtn.classList.add('recording');
                statusText.textContent = '正在聆聽並翻譯中...';
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // 顯示即時的英文句子（仍在說話中）
                if (interimTranscript) {
                    enText.textContent = interimTranscript;
                }

                // 當一句話說完（isFinal為true）時，顯示最終英文並進行翻譯
                if (finalTranscript) {
                    enText.textContent = finalTranscript;
                    zhText.textContent = "翻譯中..."; // 提示正在翻譯
                    translateText(finalTranscript);
                }
            };

            recognition.onerror = function(event) {
                console.error('語音辨識錯誤:', event.error);
                statusText.textContent = '錯誤: ' + event.error;
            };

            recognition.onend = function() {
                recognizing = false;
                startBtn.textContent = '開始接收語音';
                startBtn.classList.remove('recording');
                statusText.textContent = '語音接收已停止';
            };
        } else {
            alert('您的瀏覽器不支援語音辨識功能，請使用最新版的 Chrome 或 Edge 瀏覽器。');
        }

        // 按鈕點擊事件
        startBtn.addEventListener('click', () => {
            if (recognizing) {
                recognition.stop();
                return;
            }
            recognition.start();
        });

        // 呼叫免費翻譯 API
        async function translateText(text) {
            try {
                // 這裡使用免費的 MyMemory API 作為示範
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-TW`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.responseData && data.responseData.translatedText) {
                    zhText.textContent = data.responseData.translatedText;
                } else {
                    zhText.textContent = '[無法取得翻譯]';
                }
            } catch (error) {
                console.error('翻譯 API 錯誤:', error);
                zhText.textContent = '[網路或翻譯 API 錯誤]';
            }
        }
    </script>

</body>
</html>
