<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插入排序法動畫</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .nav {
      margin-top: 20px;
    }

    .nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #007BFF;
      font-size: 18px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-top: 50px;
      height: 300px;
    }

    .bar {
      width: 50px;
      margin: 0 5px;
      background-color: #4CAF50;
      color: white;
      text-align: center;
      line-height: 50px;
      font-size: 20px;
      border-radius: 5px;
    }

    .bar.animate {
      animation: insert 1s ease-in-out forwards;
    }

    @keyframes insert {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-50px);
      }
      100% {
        transform: translateY(0);
      }
    }

    .controls {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 0 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">氣泡排序法</a>
    <a href="insertion.html">插入排序法</a>
  </div>
  <h1>插入排序法動畫</h1>
  <div class="container" id="bars">
    <div class="bar" style="height: 100px;">5</div>
    <div class="bar" style="height: 150px;">3</div>
    <div class="bar" style="height: 200px;">8</div>
    <div class="bar" style="height: 120px;">6</div>
    <div class="bar" style="height: 180px;">4</div>
    <div class="bar" style="height: 250px;">1</div>
  </div>
  <div class="controls">
    <button id="start">開始排序</button>
    <button id="reset">重置</button>
  </div>
  <div class="description" id="description">按下「開始排序」來執行插入排序。</div>

  <script>
    const bars = document.querySelectorAll('.bar');
    const description = document.getElementById('description');
    const startButton = document.getElementById('start');
    const resetButton = document.getElementById('reset');

    let i = 1; // Current element to insert
    let j; // Position to compare
    let key, keyHeight;
    let isSorting = false;

    function insertionSortStep() {
      if (i < bars.length) {
        key = parseInt(bars[i].textContent);
        keyHeight = bars[i].style.height;
        j = i - 1;

        // Function to handle shifting
        function shiftElements() {
          if (j >= 0 && parseInt(bars[j].textContent) > key) {
            description.textContent = `移動 ${bars[j].textContent} 到右邊`;

            bars[j].classList.add('animate');
            bars[j + 1].classList.add('animate');

            setTimeout(() => {
              bars[j].classList.remove('animate');
              bars[j + 1].classList.remove('animate');

              // Shift the element
              bars[j + 1].style.height = bars[j].style.height;
              bars[j + 1].textContent = bars[j].textContent;

              j--;
              shiftElements(); // Continue shifting
            }, 1000);
          } else {
            // Insert the key
            description.textContent = `插入 ${key} 到正確位置`;
            bars[i].classList.add('animate');

            setTimeout(() => {
              bars[i].classList.remove('animate');

              bars[j + 1].style.height = keyHeight;
              bars[j + 1].textContent = key.toString();

              i++;
              insertionSortStep(); // Next element
            }, 1000);
          }
        }

        shiftElements();
      } else {
        description.textContent = '排序完成！';
        isSorting = false;
      }
    }

    startButton.addEventListener('click', () => {
      if (!isSorting) {
        isSorting = true;
        description.textContent = '開始排序...';
        i = 1;
        insertionSortStep();
      }
    });

    resetButton.addEventListener('click', () => {
      location.reload(); // Reload the page to reset the bars
    });
  </script>
</body>
</html>
